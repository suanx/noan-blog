name: Build and Deploy to EdgeOne Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

env:
  PROJECT_NAME: noan-blog
  BUILD_OUTPUT: .next
  NODE_VERSION: '22.11.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'preview' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # 构建时需要环境变量（用于 ISR 自请求）
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://noan-blog.edgeone.app' }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Verify build output
        run: |
          echo "Checking build output..."
          if [ ! -d "${{ env.BUILD_OUTPUT }}" ]; then
            echo "❌ Build output directory not found: ${{ env.BUILD_OUTPUT }}"
            exit 1
          fi
          echo "✅ Build output verified: ${{ env.BUILD_OUTPUT }}"
          ls -la ${{ env.BUILD_OUTPUT }}/server/app/ | head -20

      - name: Deploy to EdgeOne Pages
        id: deploy
        run: |
          echo "🚀 Deploying to EdgeOne Pages..."
          echo "Project: ${{ env.PROJECT_NAME }}"
          echo "Environment: ${{ github.event.inputs.environment || 'preview' }}"
          
          DEPLOY_CMD="npx edgeone pages deploy ${{ env.BUILD_OUTPUT }} -n ${{ env.PROJECT_NAME }} -t ${{ secrets.EDGEONE_API_TOKEN }}"
          
          if [ "${{ github.event.inputs.environment || 'preview' }}" = "production" ]; then
            DEPLOY_CMD="$DEPLOY_CMD -e production"
          else
            DEPLOY_CMD="$DEPLOY_CMD -e preview"
          fi
          
          DEPLOY_OUTPUT=$(eval "$DEPLOY_CMD 2>&1") || true
          echo "$DEPLOY_OUTPUT"
          
          # 解析部署 URL
          if echo "$DEPLOY_OUTPUT" | grep -q "EDGEONE_DEPLOY_URL="; then
            DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep "EDGEONE_DEPLOY_URL=" | cut -d'=' -f2-)
            echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
            echo "✅ Deploy URL: $DEPLOY_URL"
          elif echo "$DEPLOY_OUTPUT" | grep -q "https://"; then
            DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[^\s]+')
            echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
            echo "✅ Deploy URL: $DEPLOY_URL"
          fi

      - name: Deploy summary
        if: always()
        run: |
          echo "## 📦 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ env.PROJECT_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment || 'preview' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.deploy.outputs.DEPLOY_URL }}" ]; then
            echo "| Deploy URL | [Link](${{ steps.deploy.outputs.DEPLOY_URL }}) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Post-deployment checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Verify database migrations are applied" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Check EdgeOne Pages environment variables" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test admin login with ADMIN_TOKEN" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Verify AI features (if AI_API_KEY configured)" >> $GITHUB_STEP_SUMMARY

  # 可选：生产部署后运行健康检查
  health-check:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event.inputs.environment == 'production' && success()
    
    steps:
      - name: Health check
        run: |
          DEPLOY_URL="${{ needs.build-and-deploy.outputs.DEPLOY_URL }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "⚠️ No deploy URL available, skipping health check"
            exit 0
          fi
          
          echo "🏥 Running health check..."
          
          # 检查首页
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Homepage: $STATUS"
          else
            echo "⚠️ Homepage returned: $STATUS"
          fi
          
          # 检查 API
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/hello")
          if [ "$API_STATUS" = "200" ]; then
            echo "✅ API /hello: $API_STATUS"
          else
            echo "⚠️ API /hello returned: $API_STATUS"
          fi
