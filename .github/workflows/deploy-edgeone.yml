name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Deploy to EdgeOne Pages
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(npx edgeone pages deploy .next \
            -n noan-blog \
            -t ${{ secrets.EDGEONE_API_TOKEN }} 2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep "EDGEONE_DEPLOY_URL=" | cut -d'=' -f2-)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Print deploy URL
        run: echo "Deployed to ${{ steps.deploy.outputs.DEPLOY_URL }}"
